server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip для html/js/css
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # 10 МБ для аватаров/скриншотов в data-URL
    client_max_body_size 10m;

    # API — проксируем на backend контейнер.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebSocket для realtime-чата (сообщения, typing, presence).
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Чат-сокеты должны жить долго — отключаем дефолтный 60s read-timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA-фолбэк
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кешируем — чтобы при выкладке новых билдов клиенты подтягивали свежий код
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Хешированные ассеты — кешируем долго
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
