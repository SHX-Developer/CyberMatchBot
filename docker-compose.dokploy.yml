# Compose для развёртывания в Dokploy.
# Postgres сюда не включён — используем существующий Postgres-сервис из Dokploy.
# Сервисы подключены к external network `dokploy-network`, в которой живут
# все сервисы Dokploy (включая твой DATABASE-сервис), чтобы backend смог
# резолвить имя контейнера БД.

name: cybermate

networks:
  dokploy-network:
    external: true

services:
  # ─────────────────── API + Telegram Bot (один контейнер) ───────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      WEBAPP_AUTH_REQUIRED: ${WEBAPP_AUTH_REQUIRED:-true}
      WEBAPP_DEV_USER_ID: ${WEBAPP_DEV_USER_ID:-}
      WEBAPP_URL: ${WEBAPP_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - default
      - dokploy-network
    expose:
      - "8000"

  # ─────────────────── Frontend (nginx + Vite build) ───────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network
    expose:
      - "80"
